<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1F1F1F" />
    <title>Aura Rare — Premium Cosmetics & Beauty</title>

    <!-- Default meta + Open Graph / Twitter card. Serves as the fallback for
         non-JS crawlers (WhatsApp, Facebook). The data-rh="true" attribute lets
         react-helmet-async adopt and REPLACE these in-browser with per-page
         values (instead of appending duplicates). -->
    <meta data-rh="true" name="description" content="Aura Rare — premium cosmetics & curated shades. Browse the collection and order easily over WhatsApp." />
    <meta data-rh="true" property="og:site_name" content="Aura Rare" />
    <meta data-rh="true" property="og:type" content="website" />
    <meta data-rh="true" property="og:title" content="Aura Rare — Premium Cosmetics & Beauty" />
    <meta data-rh="true" property="og:description" content="Premium cosmetics & curated shades. Browse the collection and order easily over WhatsApp." />
    <meta data-rh="true" property="og:image" content="%PUBLIC_URL%/logo.png" />
    <meta data-rh="true" name="twitter:card" content="summary_large_image" />
    <meta data-rh="true" name="twitter:title" content="Aura Rare — Premium Cosmetics & Beauty" />
    <meta data-rh="true" name="twitter:description" content="Premium cosmetics & curated shades. Browse the collection and order easily over WhatsApp." />
    <meta data-rh="true" name="twitter:image" content="%PUBLIC_URL%/logo.png" />

    <link rel="stylesheet" type="text/css" href="%PUBLIC_URL%/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
</head>

<body id="page-top">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="flex flex-col min-h-screen" id="root"></div>
</body>

</html>
